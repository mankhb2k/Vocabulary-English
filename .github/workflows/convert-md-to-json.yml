name: Convert Markdown to JSON

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run converter
        run: |
          python convert_md_to_json.py

      - name: Commit generated JSON files
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add json/Vocabulary-topics.json json/Vocabulary-levels.json json/chunk-en-vi.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate JSON from Markdown"
            git push
          fi
